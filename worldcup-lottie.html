<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 World Cup — Intro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080B14;
      font-family: 'Inter', sans-serif;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }

    /* ── lottie container ── */
    #lottie {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    #lottie svg { width: 100% !important; height: 100% !important; }

    /* ── text overlay ── */
    #overlay-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 10;
      gap: 16px;
    }
    .ot-eyebrow {
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 700; letter-spacing: .25em; text-transform: uppercase;
      color: #F5C518; opacity: 0;
    }
    .ot-main {
      font-size: clamp(52px, 10vw, 120px);
      font-weight: 900; line-height: .95;
      letter-spacing: -.04em; text-align: center;
      color: #fff; opacity: 0;
      text-shadow: 0 0 80px rgba(245,197,24,.4);
    }
    .ot-main em {
      font-style: normal;
      background: linear-gradient(130deg, #FFE580, #F5C518, #C9A227);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .ot-flags {
      font-size: clamp(24px, 3.5vw, 44px);
      letter-spacing: .1em; opacity: 0;
      margin-top: 8px;
    }
    .ot-sub {
      font-size: clamp(13px, 1.5vw, 18px);
      color: rgba(255,255,255,.5);
      letter-spacing: .06em; opacity: 0;
    }

    /* ── progress bar ── */
    #progress {
      position: absolute; bottom: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, #C9A227, #FFE580, #F5C518);
      z-index: 20;
      box-shadow: 0 0 12px rgba(245,197,24,.6);
    }

    /* ── skip button ── */
    #skip {
      position: absolute; top: 28px; right: 32px; z-index: 30;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: rgba(255,255,255,.6); font-size: 13px; font-weight: 600;
      padding: 8px 20px; border-radius: 100px;
      cursor: pointer; letter-spacing: .04em;
      transition: background .2s, color .2s;
      opacity: 0;
    }
    #skip:hover { background: rgba(255,255,255,.15); color: #fff; }

    /* ── final fade overlay ── */
    #fade {
      position: absolute; inset: 0; z-index: 50;
      background: #080B14; opacity: 0; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="lottie"></div>
<div id="overlay-text">
  <div class="ot-eyebrow">FIFA · 2026 · USA · Canada · Mexico</div>
  <div class="ot-main">WORLD<br><em>CUP</em></div>
  <div class="ot-flags">🇧🇷 🇫🇷 🇦🇷 🇩🇪 🇪🇸 🇵🇹</div>
  <div class="ot-sub">谁将夺得最终桂冠？</div>
</div>
<div id="progress"></div>
<button id="skip">SKIP →</button>
<div id="fade"></div>

<script>
/* ══════════════════════════════════════════
   LOTTIE DATA BUILDER
══════════════════════════════════════════ */
function buildLottie() {
  const W = 1920, H = 1080, FR = 30, DUR = 270; // 9 seconds

  // ── helpers ──────────────────────────────
  const sv = v => ({ a: 0, k: Array.isArray(v) ? v : v });

  const SMOOTH = { i: { x: [.42], y: [1] },  o: { x: [.58], y: [0] } };
  const BOUNCE = { i: { x: [.175], y: [1.275] }, o: { x: [.42], y: [0] } };
  const LINEAR = { i: { x: [1], y: [1] }, o: { x: [0], y: [0] } };
  const EASE_O = { i: { x: [0], y: [1] }, o: { x: [.42], y: [0] } };

  function kf(t, s, e, ease) {
    const k = { t, s: [].concat(s), ...(ease || SMOOTH) };
    if (e !== undefined) k.e = [].concat(e);
    return k;
  }

  function layerKs(opts = {}) {
    return {
      p:  opts.p  !== undefined ? opts.p  : sv([W/2, H/2, 0]),
      a:  opts.a  !== undefined ? opts.a  : sv([0, 0, 0]),
      s:  opts.s  !== undefined ? opts.s  : sv([100, 100, 100]),
      r:  opts.r  !== undefined ? opts.r  : sv(0),
      o:  opts.o  !== undefined ? opts.o  : sv(100),
      sk: sv(0), sa: sv(0)
    };
  }

  function grTr(opts = {}) {
    return {
      ty: 'tr',
      p:  opts.p !== undefined ? opts.p : sv([0, 0]),
      a:  sv([0, 0]),
      s:  opts.s !== undefined ? opts.s : sv([100, 100]),
      r:  opts.r !== undefined ? opts.r : sv(0),
      o:  opts.o !== undefined ? opts.o : sv(100),
      sk: sv(0), sa: sv(0)
    };
  }

  function fl(c, op = 100) { return { ty: 'fl', nm: 'fill', c: sv(c), o: sv(op), r: 1 }; }
  function st(c, w, op = 100) {
    return { ty: 'st', nm: 'stroke', c: sv(c), o: sv(op), w: sv(w), lj: 1, lc: 2, ml: 4, d: [] };
  }

  const layers = [];
  let ind = 0;

  // ── BACKGROUND solid ─────────────────────
  layers.push({
    ty: 1, nm: 'bg', sc: '#080B14',
    sh: H, sw: W, ip: 0, op: DUR, st: 0, sr: 1, ind: ind++,
    ks: layerKs()
  });

  // Subtle gradient circle (center glow bg)
  layers.push({
    ty: 4, nm: 'bg_glow', ip: 0, op: DUR, st: 0, sr: 1, ind: ind++,
    ks: layerKs({ p: sv([W/2, H/2, 0]) }),
    shapes: [{
      ty: 'gr', nm: 'g',
      it: [
        { ty: 'el', nm: 'e', p: sv([0,0]), s: sv([900, 900]) },
        fl([0.04, 0.05, 0.12, 1]),
        grTr()
      ]
    }]
  });

  // ── STARS ────────────────────────────────
  const starData = [
    [180,110,3],[420,70,4],[690,190,3],[960,85,5],[1230,150,3],
    [1450,100,4],[1700,170,3],[1860,280,4],[280,360,2],[600,300,4],
    [880,420,3],[1150,380,2],[1500,320,4],[1780,410,3],
    [100,520,2],[350,600,3],[750,560,4],[1050,480,3],[1350,590,2],
    [1650,500,4],[1920,300,3],[50,700,3],[500,750,2],[1100,700,4],
    [1600,680,3],[200,850,2],[800,820,3],[1300,800,4],[1800,750,3],
  ];

  starData.forEach(([x, y, sz], i) => {
    const sf = i * 5;
    layers.push({
      ty: 4, nm: `s${i}`, ip: sf, op: DUR, st: 0, sr: 1, ind: ind++,
      ks: layerKs({
        p: sv([x, y, 0]),
        o: { a: 1, k: [
          kf(sf, 0, sz > 3 ? 90 : 70, SMOOTH),
          kf(sf + 40, sz > 3 ? 90 : 70, 30, SMOOTH),
          kf(sf + 80, 30, 90, SMOOTH),
          { t: DUR, s: [80] }
        ]}
      }),
      shapes: [{
        ty: 'gr', nm: 'dot',
        it: [
          { ty: 'el', nm: 'e', p: sv([0,0]), s: sv([sz, sz]) },
          fl([1, 1, 1, 1]),
          grTr()
        ]
      }]
    });
  });

  // ── SOCCER BALL ──────────────────────────
  const BR = 95; // radius, shape size = 190
  const BFINAL = [W * 0.35, H * 0.46];

  layers.push({
    ty: 4, nm: 'ball', ip: 10, op: DUR, st: 0, sr: 1, ind: ind++,
    ks: layerKs({
      p: { a: 1, k: [
        kf(10, [-BR*2, H * 0.62, 0], [BFINAL[0], BFINAL[1] + 50, 0], SMOOTH),
        kf(55, [BFINAL[0], BFINAL[1]+50, 0], [BFINAL[0], BFINAL[1]-30, 0], BOUNCE),
        kf(75, [BFINAL[0], BFINAL[1]-30, 0], BFINAL.concat([0]), SMOOTH),
        { t: 100, s: BFINAL.concat([0]) }
      ]},
      s: { a: 1, k: [
        kf(10, [0,0,100], [100,100,100], BOUNCE),
        { t: 55, s: [100,100,100] }
      ]},
      r: { a: 1, k: [
        kf(10, 0, 600, LINEAR),
        kf(75, 600, 635, SMOOTH),
        { t: 100, s: [635] }
      ]},
      o: { a: 1, k: [
        kf(10, 0, 100, SMOOTH),
        kf(145, 100, 55, SMOOTH),
        { t: DUR, s: [45] }
      ]}
    }),
    shapes: [
      // Ball base white
      {
        ty: 'gr', nm: 'ball_base',
        it: [
          { ty: 'el', nm: 'e', p: sv([0,0]), s: sv([BR*2, BR*2]) },
          fl([0.94, 0.94, 0.94, 1]),
          st([0.06, 0.06, 0.06, 1], 4),
          grTr()
        ]
      },
      // Black patches (center + 6 around)
      ...[
        [0, 0], // center
        [0, -56], [48, -28], [48, 28], [0, 56], [-48, 28], [-48, -28]
      ].map(([px, py], pi) => ({
        ty: 'gr', nm: `p${pi}`,
        it: [
          { ty: 'el', nm: 'e', p: sv([px, py]), s: sv(pi === 0 ? [38, 38] : [30, 30]) },
          fl([0.05, 0.05, 0.06, 1]),
          grTr()
        ]
      }))
    ]
  });

  // Ball landing shockwave ring
  layers.push({
    ty: 4, nm: 'ball_shock', ip: 55, op: 95, st: 0, sr: 1, ind: ind++,
    ks: layerKs({
      p: sv([BFINAL[0], BFINAL[1] + 80, 0]),
      s: { a: 1, k: [
        kf(55, [20, 10, 100], [280, 60, 100], EASE_O),
        { t: 95, s: [280, 60, 100] }
      ]},
      o: { a: 1, k: [
        kf(55, 60, 0, SMOOTH),
        { t: 95, s: [0] }
      ]}
    }),
    shapes: [{
      ty: 'gr', nm: 'ring',
      it: [
        { ty: 'el', nm: 'e', p: sv([0,0]), s: sv([180, 60]) },
        st([0.96, 0.77, 0.09, 1], 5),
        grTr()
      ]
    }]
  });

  // ── TROPHY ───────────────────────────────
  const TX = W * 0.63;
  const TY = H * 0.44;
  const GOLD = [0.965, 0.776, 0.094, 1];
  const GOLD2 = [0.84, 0.63, 0.04, 1];

  layers.push({
    ty: 4, nm: 'trophy', ip: 80, op: DUR, st: 0, sr: 1, ind: ind++,
    ks: layerKs({
      p: { a: 1, k: [
        kf(80, [TX, H + 250, 0], [TX, TY + 30, 0], SMOOTH),
        kf(115, [TX, TY+30, 0], [TX, TY, 0], BOUNCE),
        { t: 135, s: [TX, TY, 0] }
      ]},
      s: { a: 1, k: [
        kf(80, [0, 0, 100], [115, 115, 100], BOUNCE),
        kf(115, [115,115,100], [100,100,100], SMOOTH),
        { t: 135, s: [100,100,100] }
      ]},
      o: { a: 1, k: [
        kf(80, 0, 100, SMOOTH),
        { t: DUR, s: [100] }
      ]}
    }),
    shapes: [
      // Cup top ellipse
      { ty: 'gr', nm: 'top',
        it: [{ ty: 'el', nm: 'e', p: sv([0, -105]), s: sv([180, 40]) }, fl(GOLD), grTr()] },
      // Cup bowl body
      { ty: 'gr', nm: 'bowl',
        it: [{ ty: 'rc', nm: 'r', p: sv([0, -60]), s: sv([155, 90]), r: sv(18) }, fl(GOLD), grTr()] },
      // Bowl inner darker
      { ty: 'gr', nm: 'bowl_inner',
        it: [{ ty: 'rc', nm: 'r', p: sv([0, -55]), s: sv([110, 65]), r: sv(12) }, fl(GOLD2), grTr()] },
      // Rim top bar
      { ty: 'gr', nm: 'rim',
        it: [{ ty: 'rc', nm: 'r', p: sv([0, -108]), s: sv([190, 16]), r: sv(4) }, fl(GOLD), grTr()] },
      // Left handle
      { ty: 'gr', nm: 'hl',
        it: [{ ty: 'rc', nm: 'r', p: sv([-92, -68]), s: sv([22, 72]), r: sv(11) }, fl(GOLD2), grTr()] },
      // Right handle
      { ty: 'gr', nm: 'hr',
        it: [{ ty: 'rc', nm: 'r', p: sv([92, -68]), s: sv([22, 72]), r: sv(11) }, fl(GOLD2), grTr()] },
      // Stem
      { ty: 'gr', nm: 'stem',
        it: [{ ty: 'rc', nm: 'r', p: sv([0, 18]), s: sv([20, 70]), r: sv(4) }, fl(GOLD), grTr()] },
      // Base plate
      { ty: 'gr', nm: 'base1',
        it: [{ ty: 'rc', nm: 'r', p: sv([0, 63]), s: sv([190, 25]), r: sv(6) }, fl(GOLD), grTr()] },
      // Base bottom
      { ty: 'gr', nm: 'base2',
        it: [{ ty: 'rc', nm: 'r', p: sv([0, 82]), s: sv([145, 14]), r: sv(5) }, fl(GOLD2), grTr()] },
    ]
  });

  // Trophy glow halo (3 rings expanding)
  [0, 1, 2].forEach(ri => {
    const sf = 108 + ri * 22;
    layers.push({
      ty: 4, nm: `halo${ri}`, ip: sf, op: sf + 70, st: 0, sr: 1, ind: ind++,
      ks: layerKs({
        p: sv([TX, TY, 0]),
        s: { a: 1, k: [
          kf(sf, [15, 15, 100], [340, 340, 100], EASE_O),
          { t: sf + 70, s: [340, 340, 100] }
        ]},
        o: { a: 1, k: [
          kf(sf, 70, 0, SMOOTH),
          { t: sf + 70, s: [0] }
        ]}
      }),
      shapes: [{
        ty: 'gr', nm: 'ring',
        it: [
          { ty: 'el', nm: 'e', p: sv([0,0]), s: sv([200, 200]) },
          st(GOLD, ri === 0 ? 4 : 2.5),
          grTr()
        ]
      }]
    });
  });

  // Trophy glow bg circle
  layers.push({
    ty: 4, nm: 'trophy_glow', ip: 100, op: DUR, st: 0, sr: 1, ind: ind++,
    ks: layerKs({
      p: sv([TX, TY, 0]),
      s: { a: 1, k: [
        kf(100, [0, 0, 100], [200, 200, 100], BOUNCE),
        { t: 140, s: [180, 180, 100] }
      ]},
      o: { a: 1, k: [
        kf(100, 0, 28, SMOOTH),
        kf(200, 28, 15, SMOOTH),
        { t: DUR, s: [12] }
      ]}
    }),
    shapes: [{
      ty: 'gr', nm: 'glow',
      it: [
        { ty: 'el', nm: 'e', p: sv([0,0]), s: sv([400, 400]) },
        fl(GOLD),
        grTr()
      ]
    }]
  });

  // ── CONFETTI (24 pieces) ─────────────────
  const CONF_COLORS = [
    GOLD, [1,1,1,1],
    [0.18, 0.55, 0.95, 1], [0.95, 0.28, 0.22, 1],
    [0.3, 0.78, 0.35, 1],  [0.96, 0.55, 0.08, 1],
  ];

  for (let ci = 0; ci < 24; ci++) {
    const sf = 115 + Math.floor(ci * 2.5);
    const cx = W * 0.5 + (Math.random() - .5) * W * 0.55;
    const cy = H * 0.5;
    const ex = cx + (Math.random() - .5) * 600;
    const ey = cy - Math.random() * 480 - 80;
    const ey2 = ey + Math.random() * 700 + 250;
    const col = CONF_COLORS[ci % CONF_COLORS.length];
    const cw = Math.random() * 14 + 5;
    const ch = Math.random() * 22 + 7;
    const er = (Math.random() - .5) * 800;

    layers.push({
      ty: 4, nm: `c${ci}`, ip: sf, op: sf + 100, st: 0, sr: 1, ind: ind++,
      ks: layerKs({
        p: { a: 1, k: [
          kf(sf, [cx, cy, 0], [ex, ey, 0], EASE_O),
          kf(sf + 55, [ex, ey, 0], [ex + (Math.random()-.5)*120, ey2, 0],
             { i: {x:[.5],y:[0]}, o: {x:[.5],y:[1]} }),
          { t: sf + 100, s: [ex, ey2, 0] }
        ]},
        r: { a: 1, k: [kf(sf, 0, er, LINEAR), { t: sf+100, s: [er] }]},
        s: { a: 1, k: [
          kf(sf, [0,0,100], [100,100,100], BOUNCE),
          kf(sf+75, [100,100,100], [50,50,100], SMOOTH),
          { t: sf+100, s: [0,0,100] }
        ]},
        o: { a: 1, k: [
          kf(sf, 100, 100, SMOOTH),
          kf(sf + 80, 100, 0, SMOOTH),
          { t: sf + 100, s: [0] }
        ]}
      }),
      shapes: [{
        ty: 'gr', nm: 'piece',
        it: [
          { ty: 'rc', nm: 'r', p: sv([0,0]), s: sv([cw, ch]), r: sv(2) },
          fl(col),
          grTr()
        ]
      }]
    });
  }

  // ── LENS FLARE streaks ───────────────────
  [[-1, 0], [1, 0], [0, -1], [0, 1], [-.7, -.7], [.7, .7], [-.7, .7], [.7, -.7]].forEach(([dx, dy], fi) => {
    const sf = 110 + fi * 4;
    layers.push({
      ty: 4, nm: `flare${fi}`, ip: sf, op: sf + 55, st: 0, sr: 1, ind: ind++,
      ks: layerKs({
        p: sv([TX, TY, 0]),
        r: sv(Math.atan2(dy, dx) * 180 / Math.PI),
        s: { a: 1, k: [
          kf(sf, [0, 0, 100], [100, 100, 100], SMOOTH),
          kf(sf+30, [100,100,100], [160,80,100], SMOOTH),
          { t: sf+55, s: [160, 80, 100] }
        ]},
        o: { a: 1, k: [
          kf(sf, 0, 60, SMOOTH),
          kf(sf+30, 60, 0, SMOOTH),
          { t: sf+55, s: [0] }
        ]}
      }),
      shapes: [{
        ty: 'gr', nm: 'streak',
        it: [
          { ty: 'rc', nm: 'r', p: sv([100, 0]), s: sv([200, 3]), r: sv(2) },
          fl(GOLD),
          grTr()
        ]
      }]
    });
  });

  // ── WHITE FLASH (trophy impact) ──────────
  layers.push({
    ty: 1, nm: 'flash', sc: '#FFF8E0',
    sh: H, sw: W, ip: 108, op: 135, st: 0, sr: 1, ind: ind++,
    ks: layerKs({
      o: { a: 1, k: [
        kf(108, 0, 35, SMOOTH),
        kf(120, 35, 0, SMOOTH),
        { t: 135, s: [0] }
      ]}
    })
  });

  // ── FADE TO BLACK (end) ──────────────────
  layers.push({
    ty: 1, nm: 'fade_out', sc: '#080B14',
    sh: H, sw: W, ip: 240, op: DUR, st: 0, sr: 1, ind: ind++,
    ks: layerKs({
      o: { a: 1, k: [
        kf(240, 0, 100, SMOOTH),
        { t: DUR, s: [100] }
      ]}
    })
  });

  return {
    v: '5.9.0', fr: FR, ip: 0, op: DUR,
    w: W, h: H, nm: 'WorldCup2026', ddd: 0,
    assets: [],
    layers: layers.reverse() // first in array = top layer in Lottie
  };
}

/* ══════════════════════════════════════════
   INIT LOTTIE
══════════════════════════════════════════ */
const animData = buildLottie();
const anim = lottie.loadAnimation({
  container: document.getElementById('lottie'),
  renderer:  'svg',
  loop:      false,
  autoplay:  true,
  animationData: animData,
  rendererSettings: { preserveAspectRatio: 'xMidYMid slice' }
});

/* ── progress bar ── */
anim.addEventListener('enterFrame', () => {
  const pct = (anim.currentFrame / animData.op) * 100;
  document.getElementById('progress').style.width = pct + '%';
});

/* ── overlay text (GSAP synced) ── */
// Show skip at 0.5s
gsap.to('#skip', { opacity: 1, duration: .5, delay: .5 });

// At ~4s (frame 120 / 270 = 44%) → text appears
const TEXT_SEC = 4.0;
const TOTAL_SEC = animData.op / animData.fr; // 9s

anim.addEventListener('enterFrame', function onFrame() {
  const sec = anim.currentFrame / animData.fr;
  if (sec >= TEXT_SEC) {
    anim.removeEventListener('enterFrame', onFrame);
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.to('.ot-eyebrow', { opacity: 1, y: 0, duration: .5 }, 0);
    tl.fromTo('.ot-main', { y: 40 }, { opacity: 1, y: 0, duration: .7 }, .1);
    tl.to('.ot-flags',    { opacity: 1, duration: .5 }, .4);
    tl.to('.ot-sub',      { opacity: 1, duration: .5 }, .6);
  }
});

/* ── completion → go to main page ── */
function goToMain() {
  gsap.to('#fade', {
    opacity: 1, duration: .7, ease: 'power2.in',
    onComplete: () => { window.location.href = 'worldcup.html'; }
  });
}

anim.addEventListener('complete', () => setTimeout(goToMain, 400));
document.getElementById('skip').addEventListener('click', goToMain);
</script>
</body>
</html>
