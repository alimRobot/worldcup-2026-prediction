<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 世界杯冠军预测</title>

  <!-- GSAP Core + All Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #F5C518; --gold-l: #FFE580; --gold-d: #C9A227;
      --bg: #080B14; --s1: #10131E; --s2: #181C2C; --s3: #1E2235;
      --text: #EEF0FF; --muted: #5B6178; --border: rgba(255,255,255,.07);
      --red: #EF4444; --green: #22C55E;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

    /* ── canvas bg ── */
    #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .5; }

    /* ── motion path SVG ── */
    #motionSvg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: visible; opacity: 0; }

    /* ── layout ── */
    .wrap { position: relative; z-index: 1; max-width: 1140px; margin: 0 auto; padding: 0 24px 120px; }

    /* ════════════════ HERO ════════════════ */
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 0 40px; }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(245,197,24,.1); border: 1px solid rgba(245,197,24,.25);
      border-radius: 100px; padding: 7px 20px;
      font-size: 12px; font-weight: 700; letter-spacing: .1em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 32px; visibility: hidden;
    }

    .hero-title {
      font-size: clamp(44px, 9vw, 92px); font-weight: 900;
      line-height: 1; letter-spacing: -.04em;
      visibility: hidden;
    }
    .hero-title em {
      font-style: normal;
      background: linear-gradient(130deg, var(--gold-l), var(--gold), var(--gold-d));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub { color: var(--muted); font-size: 18px; margin-top: 20px; visibility: hidden; }

    /* trophy on path */
    #trophyEl {
      position: fixed; font-size: 72px; z-index: 10; pointer-events: none;
      filter: drop-shadow(0 0 32px rgba(245,197,24,.7));
      transform: translate(-50%, -50%);
      visibility: hidden;
    }

    /* trophy final position */
    .trophy-final {
      display: flex; justify-content: center; margin: 44px 0 56px;
      visibility: hidden;
    }
    .trophy-circle {
      width: 110px; height: 110px;
      background: linear-gradient(145deg, var(--gold-l), var(--gold-d));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 58px;
      box-shadow: 0 0 0 14px rgba(245,197,24,.1), 0 0 0 28px rgba(245,197,24,.06), 0 0 80px rgba(245,197,24,.45);
    }

    /* scroll cue */
    .scroll-cue { margin-top: 48px; color: var(--muted); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 8px; visibility: hidden; }
    .scroll-arrow { width: 20px; height: 20px; border-right: 2px solid var(--muted); border-bottom: 2px solid var(--muted); transform: rotate(45deg); }

    /* ════════════════ STATS ════════════════ */
    .section { margin-bottom: 80px; }
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px; opacity: 0;
    }
    .section-title { font-size: 26px; font-weight: 800; margin-bottom: 28px; opacity: 0; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .stat-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px;
      opacity: 0; transform: translateY(40px);
    }
    .stat-num { font-size: 44px; font-weight: 900; color: var(--gold); line-height: 1; }
    .stat-unit { font-size: 18px; font-weight: 700; color: var(--gold-d); margin-left: 2px; }
    .stat-desc { font-size: 13px; color: var(--muted); margin-top: 6px; }

    /* ════════════════ VOTE CARDS ════════════════ */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }

    .vcard {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px 20px 20px;
      cursor: pointer; position: relative; overflow: hidden;
      opacity: 0; transform: translateY(60px) scale(.93);
      transition: border-color .25s, background .25s;
    }
    .vcard::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% -10%, rgba(245,197,24,.1), transparent 65%);
      opacity: 0; transition: opacity .3s;
    }
    .vcard:hover { border-color: rgba(245,197,24,.3); }
    .vcard:hover::after { opacity: 1; }
    .vcard.active { border-color: var(--gold); background: linear-gradient(155deg, rgba(245,197,24,.1), var(--s1)); }
    .vcard.active::after { opacity: 1; }

    .vcard-check {
      position: absolute; top: 14px; right: 14px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--gold); display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: #000;
      opacity: 0; transform: scale(0) rotate(-30deg);
      transition: opacity .2s;
    }
    .vcard.active .vcard-check { opacity: 1; }

    .vcard-flag { font-size: 44px; margin-bottom: 12px; line-height: 1; }
    .vcard-name { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
    .vcard-region { font-size: 11px; color: var(--muted); margin-bottom: 16px; }

    .vbar-bg { background: rgba(255,255,255,.07); border-radius: 100px; height: 5px; overflow: hidden; }
    .vbar { height: 100%; width: 0; border-radius: 100px; background: linear-gradient(90deg, var(--gold-d), var(--gold-l)); transition: width 1s cubic-bezier(.16,1,.3,1); }

    .vcard-foot { display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px; }
    .vcard-pct { font-size: 20px; font-weight: 900; color: var(--gold); }
    .vcard-cnt { font-size: 11px; color: var(--muted); }

    /* ════════════════ LIVE RANKING (Flip) ════════════════ */
    .rank-list { display: flex; flex-direction: column; gap: 10px; }

    .rank-item {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      opacity: 0; transform: translateX(-40px);
      will-change: transform;
    }
    .rank-pos {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
      background: var(--s2); color: var(--muted);
    }
    .rank-pos.gold { background: linear-gradient(135deg, var(--gold-l), var(--gold-d)); color: #000; }
    .rank-pos.silver { background: linear-gradient(135deg, #E2E8F0, #94A3B8); color: #000; }
    .rank-pos.bronze { background: linear-gradient(135deg, #CD7F32, #92400E); color: #fff; }

    .rank-flag { font-size: 28px; }
    .rank-name { flex: 1; font-size: 15px; font-weight: 700; }
    .rank-bar-wrap { flex: 2; background: rgba(255,255,255,.07); border-radius: 100px; height: 6px; overflow: hidden; }
    .rank-bar { height: 100%; width: 0; border-radius: 100px; background: linear-gradient(90deg, var(--gold-d), var(--gold-l)); transition: width 1s cubic-bezier(.16,1,.3,1); }
    .rank-pct { font-size: 16px; font-weight: 900; color: var(--gold); width: 48px; text-align: right; }

    /* move indicators */
    .rank-delta { font-size: 11px; font-weight: 700; width: 28px; text-align: center; }
    .rank-delta.up { color: var(--green); }
    .rank-delta.dn { color: var(--red); }
    .rank-delta.eq { color: var(--muted); }

    /* ════════════════ DRAG SECTION ════════════════ */
    .drag-intro { color: var(--muted); font-size: 14px; margin-bottom: 20px; opacity: 0; }
    .drag-hint { display: inline-flex; align-items: center; gap: 6px; background: rgba(245,197,24,.1); border: 1px solid rgba(245,197,24,.2); border-radius: 8px; padding: 6px 14px; font-size: 12px; color: var(--gold); font-weight: 600; }

    .drag-container {
      display: flex; gap: 12px; flex-wrap: wrap;
      min-height: 90px; padding: 16px;
      background: var(--s1); border: 2px dashed rgba(245,197,24,.2);
      border-radius: 20px; position: relative;
      opacity: 0;
    }
    .drag-container.over { border-color: rgba(245,197,24,.5); background: rgba(245,197,24,.04); }

    .drag-chip {
      display: flex; align-items: center; gap: 10px;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 18px;
      cursor: grab; user-select: none; touch-action: none;
      font-size: 14px; font-weight: 700;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
      transition: border-color .2s, box-shadow .2s;
    }
    .drag-chip:active { cursor: grabbing; }
    .drag-chip.dragging { opacity: .5; border-color: var(--gold); box-shadow: 0 8px 32px rgba(245,197,24,.3); }
    .drag-chip .chip-flag { font-size: 22px; }
    .drag-chip .chip-num { font-size: 11px; font-weight: 800; color: var(--gold); background: rgba(245,197,24,.15); padding: 2px 8px; border-radius: 100px; }

    .drag-pool {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 16px; min-height: 70px;
      background: var(--s2); border-radius: 16px;
      margin-top: 12px; opacity: 0;
    }

    .drag-labels { display: flex; gap: 12px; margin-bottom: 8px; opacity: 0; }
    .drag-label { flex: 1; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); padding-left: 4px; }

    /* ════════════════ TOAST ════════════════ */
    .toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--gold); color: #000; font-weight: 800; font-size: 14px;
      padding: 13px 30px; border-radius: 100px;
      box-shadow: 0 8px 40px rgba(245,197,24,.45);
      z-index: 1000; pointer-events: none; opacity: 0; white-space: nowrap;
    }

    /* ════════════════ PARTICLE ════════════════ */
    .pt { position: fixed; border-radius: 50%; pointer-events: none; z-index: 999; }

    /* ════════════════ RESPONSIVE ════════════════ */
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr; }
      .rank-bar-wrap { display: none; }
    }
  </style>
</head>
<body>

<!-- animated bg canvas -->
<canvas id="bgCanvas"></canvas>

<!-- MotionPath SVG (hidden curve for trophy to follow) -->
<svg id="motionSvg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice"
     style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:visible">
  <path id="trophyPath" d="M -100,950 C 200,700 400,200 720,450" fill="none" stroke="none"/>
</svg>

<!-- floating trophy for MotionPath -->
<div id="trophyEl">🏆</div>

<div class="wrap">

  <!-- ══════════ HERO ══════════ -->
  <section class="hero" id="heroSec">
    <div class="hero-badge" id="heroBadge">⚽ FIFA World Cup 2026 · USA · Canada · Mexico</div>
    <h1 class="hero-title" id="heroTitle">预测你心中的<br><em>世界杯冠军</em></h1>
    <p class="hero-sub" id="heroSub">投出你的一票，为你支持的球队加油助威</p>

    <div class="trophy-final" id="trophyFinal">
      <div class="trophy-circle" id="trophyCircle">🏆</div>
    </div>

    <div class="scroll-cue" id="scrollCue">
      <span>向下滚动探索</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- ══════════ STATS ══════════ -->
  <section class="section" id="statsSec">
    <div class="section-label">数据概览</div>
    <div class="section-title">赛事亮点</div>
    <div class="stats-grid">
      <div class="stat-card" id="sc0">
        <div><span class="stat-num" data-target="48">0</span><span class="stat-unit">支</span></div>
        <div class="stat-desc">史上最多参赛球队</div>
      </div>
      <div class="stat-card" id="sc1">
        <div><span class="stat-num" data-target="16">0</span><span class="stat-unit">座</span></div>
        <div class="stat-desc">跨三国举办城市</div>
      </div>
      <div class="stat-card" id="sc2">
        <div><span class="stat-num" id="daysNum">0</span><span class="stat-unit">天</span></div>
        <div class="stat-desc">距开幕 2026-06-11</div>
      </div>
    </div>
  </section>

  <!-- ══════════ VOTE ══════════ -->
  <section class="section" id="voteSec">
    <div class="section-label">投票环节</div>
    <div class="section-title">选择你的冠军</div>
    <div class="cards-grid" id="cardsGrid"></div>
  </section>

  <!-- ══════════ LIVE RANKING (Flip) ══════════ -->
  <section class="section" id="rankSec">
    <div class="section-label">实时排名</div>
    <div class="section-title">当前预测榜 <span style="font-size:13px;color:var(--muted);font-weight:400">— 投票后自动更新</span></div>
    <div class="rank-list" id="rankList"></div>
  </section>

  <!-- ══════════ DRAG (Draggable) ══════════ -->
  <section class="section" id="dragSec">
    <div class="section-label">个人排位</div>
    <div class="section-title">拖拽你的前三名</div>
    <div class="drag-intro" id="dragIntro">
      <span class="drag-hint">☝️ 从下方把球队拖入排名区，自由排序</span>
    </div>
    <div class="drag-labels" id="dragLabels">
      <div class="drag-label">🥇 你的排名区</div>
    </div>
    <div class="drag-container" id="dragTarget"></div>
    <div class="drag-pool" id="dragPool"></div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
gsap.registerPlugin(ScrollTrigger, Draggable, MotionPathPlugin, Flip);

/* ─────────────────────────────────────────
   DATA
───────────────────────────────────────── */
const TEAMS = [
  { flag:'🇧🇷', name:'巴西',   region:'南美',   base:22 },
  { flag:'🇫🇷', name:'法国',   region:'欧洲',   base:19 },
  { flag:'🇦🇷', name:'阿根廷', region:'南美',   base:17 },
  { flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', name:'英格兰', region:'欧洲',   base:14 },
  { flag:'🇩🇪', name:'德国',   region:'欧洲',   base:12 },
  { flag:'🇪🇸', name:'西班牙', region:'欧洲',   base:11 },
  { flag:'🇵🇹', name:'葡萄牙', region:'欧洲',   base:9  },
  { flag:'🇳🇱', name:'荷兰',   region:'欧洲',   base:7  },
  { flag:'🇧🇪', name:'比利时', region:'欧洲',   base:5  },
  { flag:'🇺🇾', name:'乌拉圭', region:'南美',   base:4  },
  { flag:'🇮🇹', name:'意大利', region:'欧洲',   base:4  },
  { flag:'🇺🇸', name:'美国',   region:'北美',   base:3  },
];

let extraVotes = {};  // { teamIndex: count }
let userVoteIdx = null;
let prevRank = [];

function getCounts() { return TEAMS.map((t,i) => t.base + (extraVotes[i]||0)); }
function getTotal() { return getCounts().reduce((a,b)=>a+b,0); }
function getPct(i) { const t=getTotal(); return t ? Math.round(getCounts()[i]/t*100) : 0; }
function getRanked() {
  return TEAMS.map((t,i)=>({...t,i,pct:getPct(i),cnt:getCounts()[i]}))
              .sort((a,b)=>b.pct-a.pct);
}

/* ─────────────────────────────────────────
   CANVAS STARFIELD
───────────────────────────────────────── */
(function(){
  const c = document.getElementById('bgCanvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function init(){
    stars = Array.from({length:120},()=>({
      x:Math.random()*innerWidth, y:Math.random()*innerHeight,
      r:Math.random()*1.5+.3, a:Math.random(), da:(Math.random()-.5)*.004
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a = Math.max(.05,Math.min(1,s.a+s.da));
      if(s.a<=.05||s.a>=1) s.da*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); init(); draw();
  window.addEventListener('resize',()=>{ resize(); init(); });
})();

/* ─────────────────────────────────────────
   BUILD VOTE CARDS
───────────────────────────────────────── */
const grid = document.getElementById('cardsGrid');
TEAMS.forEach((t,i)=>{
  const d = document.createElement('div');
  d.className = 'vcard'; d.id = `vc${i}`;
  d.innerHTML = `
    <div class="vcard-check">✓</div>
    <div class="vcard-flag">${t.flag}</div>
    <div class="vcard-name">${t.name}</div>
    <div class="vcard-region">${t.region}</div>
    <div class="vbar-bg"><div class="vbar" id="vb${i}"></div></div>
    <div class="vcard-foot">
      <div class="vcard-pct" id="vp${i}">--%</div>
      <div class="vcard-cnt" id="vn${i}"></div>
    </div>`;
  d.addEventListener('click',()=>castVote(i));
  grid.appendChild(d);

  // hover micro
  d.addEventListener('mouseenter',()=>gsap.to(d,{y:-5,scale:1.025,duration:.2,ease:'power2.out'}));
  d.addEventListener('mouseleave',()=>gsap.to(d,{y:0,scale:1,duration:.3,ease:'power2.out'}));
});

/* ─────────────────────────────────────────
   BUILD RANK LIST
───────────────────────────────────────── */
function buildRankList(){
  const list = document.getElementById('rankList');
  list.innerHTML = '';
  getRanked().forEach((t,pos)=>{
    const posClass = pos===0?'gold':pos===1?'silver':pos===2?'bronze':'';
    const label = pos===0?'1':pos===1?'2':pos===2?'3':`${pos+1}`;
    const prev = prevRank.indexOf(t.i);
    let deltaHtml = '<span class="rank-delta eq">—</span>';
    if(prevRank.length){
      const diff = prev - pos;
      if(diff>0) deltaHtml=`<span class="rank-delta up">▲${diff}</span>`;
      else if(diff<0) deltaHtml=`<span class="rank-delta dn">▼${Math.abs(diff)}</span>`;
    }
    const item = document.createElement('div');
    item.className = 'rank-item'; item.dataset.team = t.i;
    item.innerHTML = `
      <div class="rank-pos ${posClass}">${label}</div>
      <div class="rank-flag">${t.flag}</div>
      <div class="rank-name">${t.name}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" id="rb${t.i}"></div></div>
      ${deltaHtml}
      <div class="rank-pct">${t.pct}%</div>`;
    list.appendChild(item);
  });
  prevRank = getRanked().map(x=>x.i);
}

/* ─────────────────────────────────────────
   UPDATE UI
───────────────────────────────────────── */
function refreshUI(useFlip=false){
  const list = document.getElementById('rankList');

  // capture Flip state before DOM change
  const flipState = useFlip ? Flip.getState(list.querySelectorAll('.rank-item')) : null;

  buildRankList();

  // animate bars
  TEAMS.forEach((_,i)=>{
    const pct = getPct(i);
    const vb = document.getElementById(`vb${i}`);
    const rb = document.getElementById(`rb${i}`);
    if(vb) setTimeout(()=>{ vb.style.width=pct+'%'; },80);
    if(rb) setTimeout(()=>{ rb.style.width=pct+'%'; },80);
    const vp = document.getElementById(`vp${i}`);
    const vn = document.getElementById(`vn${i}`);
    if(vp) vp.textContent = pct+'%';
    if(vn) vn.textContent = getCounts()[i].toLocaleString()+' 票';
  });

  // Flip animate rank reorder
  if(flipState){
    Flip.from(flipState, {
      duration: .7,
      ease: 'power2.inOut',
      stagger: .04,
      absolute: true,
      onEnter: els => gsap.fromTo(els,{opacity:0,x:30},{opacity:1,x:0,duration:.4}),
      onLeave: els => gsap.to(els,{opacity:0,x:-30,duration:.3}),
    });
  }
}

/* ─────────────────────────────────────────
   VOTE
───────────────────────────────────────── */
function castVote(i){
  if(userVoteIdx !== null){
    document.getElementById(`vc${userVoteIdx}`).classList.remove('active');
    if(extraVotes[userVoteIdx]) extraVotes[userVoteIdx]--;
  }
  userVoteIdx = i;
  extraVotes[i] = (extraVotes[i]||0)+1;
  const card = document.getElementById(`vc${i}`);
  card.classList.add('active');

  // check mark pop
  gsap.fromTo(card.querySelector('.vcard-check'),
    {scale:0,rotation:-30},
    {scale:1,rotation:0,duration:.5,ease:'elastic.out(1.3,.5)'}
  );
  // card bounce
  gsap.fromTo(card,{scale:.94},{scale:1,duration:.6,ease:'elastic.out(1.2,.4)'});

  spawnParticles(card);
  showToast(`✓ 已为 ${TEAMS[i].name} ${TEAMS[i].flag} 投票！`);
  refreshUI(true);
}

/* ─────────────────────────────────────────
   PARTICLES
───────────────────────────────────────── */
function spawnParticles(ref){
  const rect = ref ? ref.getBoundingClientRect() : {left:innerWidth/2,top:innerHeight/2,width:0,height:0};
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const colors=['#F5C518','#FFE580','#fff','#FFA500','#FFDD00'];
  for(let k=0;k<20;k++){
    const p = document.createElement('div');
    p.className='pt';
    const sz = Math.random()*10+4;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${colors[k%colors.length]};left:${cx}px;top:${cy}px;`;
    document.body.appendChild(p);
    const angle = (k/20)*Math.PI*2;
    const dist = Math.random()*160+60;
    gsap.fromTo(p,
      {scale:0,opacity:1,x:0,y:0},
      {scale:Math.random()+.5,
       x:Math.cos(angle)*dist, y:Math.sin(angle)*dist-80,
       opacity:0, duration:Math.random()*.7+.5, ease:'power2.out',
       onComplete:()=>p.remove()}
    );
  }
}

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  gsap.killTweensOf(t);
  gsap.fromTo(t,
    {y:100,opacity:0},
    {y:0,opacity:1,duration:.5,ease:'back.out(1.8)',
      onComplete(){ gsap.to(t,{opacity:0,y:-16,delay:2.2,duration:.4,ease:'power2.in'}); }
    }
  );
}

/* ─────────────────────────────────────────
   DRAGGABLE SETUP
───────────────────────────────────────── */
function setupDraggable(){
  const target  = document.getElementById('dragTarget');
  const pool    = document.getElementById('dragPool');

  // populate pool with all teams
  TEAMS.forEach((t,i)=>{
    const chip = document.createElement('div');
    chip.className='drag-chip'; chip.dataset.idx=i;
    chip.innerHTML=`<span class="chip-flag">${t.flag}</span><span>${t.name}</span>`;
    pool.appendChild(chip);
  });

  function makeChipsDraggable(){
    Draggable.create('.drag-chip',{
      type:'x,y',
      edgeResistance:.65,
      onDragStart(){ gsap.to(this.target,{scale:1.1,boxShadow:'0 12px 40px rgba(245,197,24,.4)',duration:.2}); this.target.classList.add('dragging'); },
      onDragEnd(){
        const me = this;
        gsap.to(me.target,{scale:1,boxShadow:'0 2px 12px rgba(0,0,0,.4)',duration:.25});
        me.target.classList.remove('dragging');
        const r = me.target.getBoundingClientRect();
        const tr= target.getBoundingClientRect();
        const pr= pool.getBoundingClientRect();
        const inTarget = r.left<tr.right && r.right>tr.left && r.top<tr.bottom && r.bottom>tr.top;
        const inPool   = r.left<pr.right && r.right>pr.left && r.top<pr.bottom && r.bottom>pr.top;
        const fromTarget= me.target.parentElement===target;
        gsap.set(me.target,{x:0,y:0,clearProps:'transform'});

        if(inTarget && !fromTarget){
          const state = Flip.getState(me.target);
          target.appendChild(me.target);
          updateChipNums();
          Flip.from(state,{duration:.45,ease:'back.out(1.5)'});
          gsap.fromTo(me.target,{scale:.8},{scale:1,duration:.4,ease:'elastic.out(1,.5)'});
          makeChipsDraggable();
          target.classList.remove('over');
        } else if(inPool && fromTarget){
          const state = Flip.getState(me.target);
          pool.appendChild(me.target);
          updateChipNums();
          Flip.from(state,{duration:.45,ease:'back.out(1.5)'});
          makeChipsDraggable();
        } else {
          // snap back
          gsap.to(me.target,{x:0,y:0,duration:.4,ease:'elastic.out(1,.5)',clearProps:'transform'});
        }
      }
    });
  }

  function updateChipNums(){
    [...target.querySelectorAll('.drag-chip')].forEach((c,i)=>{
      let num = c.querySelector('.chip-num');
      if(!num){ num=document.createElement('span'); num.className='chip-num'; c.appendChild(num); }
      num.textContent=['🥇','🥈','🥉'][i]||(i+1)+'位';
    });
    [...pool.querySelectorAll('.drag-chip .chip-num')].forEach(n=>n.remove());
  }

  // drag-over glow
  target.addEventListener('dragover',()=>target.classList.add('over'));
  target.addEventListener('dragleave',()=>target.classList.remove('over'));

  makeChipsDraggable();
}

/* ─────────────────────────────────────────
   MOTIONPATH — Trophy entrance
───────────────────────────────────────── */
function runTrophyMotionPath(onDone){
  const el = document.getElementById('trophyEl');
  el.style.visibility='visible';

  // Scale path to viewport
  const vw=innerWidth, vh=innerHeight;
  document.getElementById('trophyPath')
    .setAttribute('d',`M ${-80},${vh+80} C ${vw*.15},${vh*.5} ${vw*.35},${vh*.1} ${vw*.5},${vh*.45}`);

  gsap.set(el,{xPercent:-50,yPercent:-50,scale:1.4,opacity:1});

  gsap.to(el,{
    duration:1.6,
    ease:'power3.inOut',
    motionPath:{
      path:'#trophyPath',
      align:'#trophyPath',
      alignOrigin:[.5,.5],
      autoRotate:false,
      start:0, end:1,
    },
    scale:.8,
    onComplete(){
      // snap to circle position
      const circle = document.getElementById('trophyCircle');
      const cr = circle.getBoundingClientRect();
      gsap.to(el,{
        x: cr.left+cr.width/2, y: cr.top+cr.height/2,
        scale:0, duration:.3, ease:'power3.in',
        onComplete(){
          el.style.visibility='hidden';
          document.getElementById('trophyFinal').style.visibility='visible';
          gsap.fromTo('#trophyFinal',
            {opacity:0,scale:.4,rotation:-20},
            {opacity:1,scale:1,rotation:0,duration:.8,ease:'elastic.out(1,.5)',
              onComplete: onDone }
          );
          // glow pulse
          gsap.to('#trophyCircle',{
            boxShadow:'0 0 0 20px rgba(245,197,24,.18), 0 0 0 40px rgba(245,197,24,.08), 0 0 100px rgba(245,197,24,.55)',
            duration:.6,yoyo:true,repeat:2
          });
        }
      });
    }
  });
}

/* ─────────────────────────────────────────
   HERO ENTRANCE TIMELINE
───────────────────────────────────────── */
function runHeroTimeline(){
  const tl = gsap.timeline();

  // badge
  tl.set('#heroBadge',{visibility:'visible'});
  tl.fromTo('#heroBadge',
    {opacity:0,y:-20,scale:.85},
    {opacity:1,y:0,scale:1,duration:.6,ease:'back.out(1.8)'}
  );
  // title
  tl.set('#heroTitle',{visibility:'visible'});
  tl.fromTo('#heroTitle',
    {opacity:0,y:70,skewY:5},
    {opacity:1,y:0,skewY:0,duration:.7,ease:'power3.out'},
    '-=.2'
  );
  // sub
  tl.set('#heroSub',{visibility:'visible'});
  tl.fromTo('#heroSub',
    {opacity:0,y:20},
    {opacity:1,y:0,duration:.5},
    '-=.3'
  );

  // trophy motion path
  tl.add(()=>runTrophyMotionPath(()=>{
    // trophy float
    gsap.to('#trophyCircle',{y:-10,rotation:3,duration:2.4,ease:'sine.inOut',yoyo:true,repeat:-1});
    // scroll cue
    document.getElementById('scrollCue').style.visibility='visible';
    gsap.fromTo('#scrollCue',{opacity:0,y:10},{opacity:1,y:0,duration:.6});
    gsap.to('#scrollCue .scroll-arrow',{y:6,duration:.8,ease:'sine.inOut',yoyo:true,repeat:-1});
  }), '-=.1');
}

/* ─────────────────────────────────────────
   SCROLLTRIGGER SECTIONS
───────────────────────────────────────── */
function setupScrollTriggers(){
  // stats label+title
  gsap.fromTo('#statsSec .section-label',
    {opacity:0,x:-20},{opacity:1,x:0,duration:.5},
    {scrollTrigger:{trigger:'#statsSec',start:'top 80%'}}
  );
  gsap.fromTo('#statsSec .section-title',
    {opacity:0,y:20},{opacity:1,y:0,duration:.5,delay:.1},
    {scrollTrigger:{trigger:'#statsSec',start:'top 80%'}}
  );

  // stat cards stagger + counter
  gsap.to('.stat-card',{
    opacity:1, y:0, stagger:.12, duration:.7, ease:'back.out(1.4)',
    scrollTrigger:{trigger:'#statsSec',start:'top 75%',
      onEnter(){ countUp(); }
    }
  });

  // countdown days
  const opening = new Date('2026-06-11');
  const daysLeft = Math.max(0, Math.ceil((opening - new Date())/86400000));
  document.getElementById('daysNum').dataset.target = daysLeft;

  function countUp(){
    document.querySelectorAll('.stat-num[data-target]').forEach(el=>{
      const target = +el.dataset.target;
      gsap.to({val:0},{val:target,duration:1.8,ease:'power2.out',
        onUpdate(){ el.textContent = Math.round(this.targets()[0].val); }
      });
    });
  }

  // vote section
  gsap.fromTo('#voteSec .section-label',{opacity:0,x:-20},{opacity:1,x:0,duration:.5},
    {scrollTrigger:{trigger:'#voteSec',start:'top 80%'}});
  gsap.fromTo('#voteSec .section-title',{opacity:0,y:20},{opacity:1,y:0,duration:.5,delay:.1},
    {scrollTrigger:{trigger:'#voteSec',start:'top 80%'}});

  // vote cards stagger
  gsap.to('.vcard',{
    opacity:1, y:0, scale:1, rotationY:0,
    stagger:.07, duration:.6, ease:'back.out(1.5)',
    scrollTrigger:{trigger:'#cardsGrid',start:'top 80%',
      onEnter(){ refreshUI(false); }
    }
  });

  // rank section
  gsap.fromTo('#rankSec .section-label',{opacity:0,x:-20},{opacity:1,x:0,duration:.5},
    {scrollTrigger:{trigger:'#rankSec',start:'top 80%'}});
  gsap.fromTo('#rankSec .section-title',{opacity:0,y:20},{opacity:1,y:0,duration:.5,delay:.1},
    {scrollTrigger:{trigger:'#rankSec',start:'top 80%'}});
  gsap.to('.rank-item',{
    opacity:1, x:0, stagger:.06, duration:.55, ease:'power3.out',
    scrollTrigger:{trigger:'#rankList',start:'top 82%',
      onEnter(){ getRanked().forEach(t=>{
        const rb=document.getElementById(`rb${t.i}`);
        if(rb) setTimeout(()=>{rb.style.width=t.pct+'%';},100);
      });}
    }
  });

  // drag section
  gsap.fromTo('#dragSec .section-label',{opacity:0,x:-20},{opacity:1,x:0,duration:.5},
    {scrollTrigger:{trigger:'#dragSec',start:'top 80%'}});
  gsap.fromTo('#dragSec .section-title',{opacity:0,y:20},{opacity:1,y:0,duration:.5,delay:.1},
    {scrollTrigger:{trigger:'#dragSec',start:'top 80%'}});
  gsap.to(['#dragIntro','#dragLabels','#dragTarget','#dragPool'],{
    opacity:1, y:0, stagger:.1, duration:.6, ease:'back.out(1.3)',
    scrollTrigger:{trigger:'#dragSec',start:'top 78%'}
  });
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
buildRankList();
refreshUI(false);

// initial stat to 0
document.getElementById('daysNum').textContent='0';

runHeroTimeline();
setupScrollTriggers();
setupDraggable();
</script>
